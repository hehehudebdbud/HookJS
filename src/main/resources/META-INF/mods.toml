modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "MIT"

[[mods]]
    modId          = "${mod_id}"
    version        = "${mod_version}"
    displayName    = "${mod_name}"
    description    = """${mod_description}"""
    authors        = "${mod_authors}"
    displayURL     = ""
    logoFile       = ""

[[dependencies.${mod_id}]]
    modId      = "forge"
    mandatory  = true
    versionRange = "${forge_version_range}"
    ordering   = "NONE"
    side       = "BOTH"

[[dependencies.${mod_id}]]
    modId      = "minecraft"
    mandatory  = true
    versionRange = "${minecraft_version_range}"
    ordering   = "NONE"
    side       = "BOTH"

[[dependencies.${mod_id}]]
    modId      = "kubejs"
    mandatory  = true
    versionRange = "[2001.6.0,)"
    ordering   = "BEFORE"
    side       = "BOTH"

